<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inventario</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <main class="container">
        <div class="contenedor-principal">
            <div class="contenedor-superior">
                <div class="img-logo"><img src="img/Logo-ST.png"></img></div>
                <div class="contenedorilustracion">
                    <h1>Inventario</h1>
                        <h2>Gestor de inventario</h2>        
                </div>
            </div>

            <div class="contenedor-inferior">
                <form class="login-box">
                    <h2>Iniciar sesion</h2>
                        <input type="email" placeholder="Email" required>
                        <input type="password" placeholder="Password" required>
                
                    <div class="opciones">
                        <a href="/recuperar-password">¿Olvidaste tu contraseña?</a>
                    </div>
                    
                    <div class="boton-contenedor">
                        <a href="dashboard-user.html" class="login">Login Usuario</a>
                    </div>
                    <div class="boton-contenedor">
                        <a href="dashboard-admin.html" class="login">Login Admin</a>
                    </div>
                    <p class="registrar">
                        ¿No tienes una cuenta? <a class="registrar" href="/registrar">Registrarme</a>
                    </p>    
                </form>
            </div>
        </div>
        
    </main>
</body>
</html>
