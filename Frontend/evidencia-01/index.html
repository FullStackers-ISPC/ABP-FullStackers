<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inventario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <div class="izquierda">
            <div class="ilustracion">
                <h1>Inventario</h1>
                    <h2>Gestor de inventario</h2>
                    <img src="https://www.xamai.com/hubfs/Miniaturas%20junio%20(2)-3.webp"></img>
            </div>
        </div>

        <div class="derecha">
            <form class="login-box">
                <h2>Iniciar sesion</h2>
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Password" required>
            
                <div class="opciones">
                    <a href="/recuperar-password">¿Olvidaste tu contraseña?</a>
                </div>
                
                <button type="submit">Login</button>

                <p class="registrar">
                    ¿No tienes una cuenta? <a href="/registrar">Registrarme</a>
                </p>    
            </form>
        </div>
    </main>


    <script>
    document.querySelector('.login-box').addEventListener('submit', function(e) {
        e.preventDefault();

        const email = this.querySelector('input[type="email"]').value;
        const pass = this.querySelector('input[type="password"]').value;

        if (email === "admin@ispc.edu.ar" && pass === "123345678") {
            alert("Acceso concedido. ¡Hola admin!");
            window.location.href = "dashboard.html";
        } else {
            alert("Error: Usuario o contraseña incorrectos.");
        }
    });
</script>
</body>
</html>
